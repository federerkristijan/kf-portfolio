name: SBOM Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  security_repo_scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          format: cyclonedx-json
          output-file: sbom.cdx.json

      - name: Install grype
        run: curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan for vulnerabilities (table log)
        run: grype sbom:sbom.cdx.json --by-cve --fail-on high -o table

      - name: Scan for vulnerabilities (json report)
        run: grype sbom:sbom.cdx.json --by-cve -o json > grype.json
        if: always()

      - name: Install grant
        run: curl -sSfL https://raw.githubusercontent.com/anchore/grant/main/install.sh | sh -s -- -b /usr/local/bin

      - name: License report
        run: grant list sbom.cdx.json -f=grant.json -v

      - name: Secret scan
        uses: trufflesecurity/trufflehog@ec67ff26cdeb5c8600a2ca83992d9347975c172a # main
        with:
          path: ./
          extra_args: --no-verification --json

      - name: npm audit
        run: npm audit --audit-level=high --omit=dev

      - name: Upload security reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: security-reports
          path: |
            sbom.cdx.json
            grype.json
            grant.json

