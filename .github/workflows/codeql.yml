name: CodeQL Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * 1"

permissions: read-all

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@52485aec7be33610227643b0fe83936b8b5f061a # v3
        with:
          languages: javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@52485aec7be33610227643b0fe83936b8b5f061a # v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@52485aec7be33610227643b0fe83936b8b5f061a # v3
